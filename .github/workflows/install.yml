name: Node CI
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NAME: palabra
    strategy:
      matrix:
        node-version:
          - 25.x
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install Bun
        run: bun i --no-save
      - name: Palabra Install
        run: bun bin/palabra.js install `bun bin/palabra.js list`
